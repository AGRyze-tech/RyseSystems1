<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="200" height="200">

  <defs>
    <!-- S-wave mask: defines the two white S-channels cutting through the blobs -->
    <mask id="waveMask">
      <rect width="220" height="220" fill="white"/>

      <!-- Top S-channel: enters from left at ~y=78, curves through center, exits right -->
      <path d="
        M-5,68
        C 20,60  45,58  55,72
        C 68,90  80,105  100,100
        C 120,95  132,80  148,72
        C 158,66  178,64  225,68
        L 225,82
        C 178,78  158,80  148,88
        C 132,98  120,112  100,114
        C 80,116  68,100  55,88
        C 45,76  20,74  -5,82
        Z
      " fill="black"/>

      <!-- Bottom S-channel: mirrors the top, shifted down ~30px -->
      <path d="
        M-5,120
        C 20,112  45,110  55,124
        C 68,142  80,157  100,152
        C 120,147  132,132  148,124
        C 158,118  178,116  225,120
        L 225,134
        C 178,130  158,132  148,140
        C 132,150  120,164  100,166
        C 80,168  68,152  55,140
        C 45,128  20,126  -5,130
        Z
      " fill="black"/>
    </mask>
  </defs>

  <!-- 4 organic blob shapes in a 2×2 grid, masked by the S-channels -->
  <g fill="#0c4a34" mask="url(#waveMask)">
    <!-- Top-left blob -->
    <path d="
      M 55,10
      C 72,10  88,18  94,32
      C 100,44  100,52  100,55
      C 100,58  100,66  94,78
      C 88,92  72,100  55,100
      C 38,100  22,92  16,78
      C 10,66  10,58  10,55
      C 10,52  10,44  16,32
      C 22,18  38,10  55,10 Z
    "/>

    <!-- Top-right blob -->
    <path d="
      M 165,10
      C 182,10  198,18  204,32
      C 210,44  210,52  210,55
      C 210,58  210,66  204,78
      C 198,92  182,100  165,100
      C 148,100  132,92  126,78
      C 120,66  120,58  120,55
      C 120,52  120,44  126,32
      C 132,18  148,10  165,10 Z
    "/>

    <!-- Bottom-left blob -->
    <path d="
      M 55,120
      C 72,120  88,128  94,142
      C 100,154  100,162  100,165
      C 100,168  100,176  94,188
      C 88,202  72,210  55,210
      C 38,210  22,202  16,188
      C 10,176  10,168  10,165
      C 10,162  10,154  16,142
      C 22,128  38,120  55,120 Z
    "/>

    <!-- Bottom-right blob -->
    <path d="
      M 165,120
      C 182,120  198,128  204,142
      C 210,154  210,162  210,165
      C 210,168  210,176  204,188
      C 198,202  182,210  165,210
      C 148,210  132,202  126,188
      C 120,176  120,168  120,165
      C 120,162  120,154  126,142
      C 132,128  148,120  165,120 Z
    "/>
  </g>

  <!-- Registered trademark symbol -->
  <text
    x="188"
    y="28"
    font-size="22"
    font-family="Georgia, 'Times New Roman', serif"
    fill="#0c4a34"
    font-weight="400"
  >&#174;</text>

</svg>
